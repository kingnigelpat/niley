<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PORTAL | NILEY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <!-- Firebase SDKs -->
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script defer src="firebase-config.js"></script>

    <style>
        /* Admin-specific overrides for better management UI */
        .admin-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 24px;
            border-radius: var(--radius-md);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
            font-family: var(--font-heading);
        }

        .admin-form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--card-border);
            position: sticky;
            top: 100px;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            color: white;
            font-family: var(--font-body);
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .admin-layout {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .admin-form-container {
                position: static;
                padding: 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admin-body {
                padding-bottom: 60px;
            }
        }
    </style>
</head>

<body class="admin-body">
    <nav class="scrolled">
        <div class="container nav-container">
            <a href="./" class="logo-container">
                <img src="niley-logo-removebg-preview.png" alt="Niley Logo" class="logo-img">
                <span class="logo-text">Vault Monitor</span>
            </a>
            <div class="nav-actions">
                <a href="./" class="btn-outline" style="padding: 10px 20px; font-size: 0.8rem;">View Store</a>
                <button id="logout-btn" class="btn-primary"
                    style="display: none; padding: 10px 20px; font-size: 0.8rem;" onclick="logout()">Secure
                    Logout</button>
            </div>
        </div>
    </nav>

    <!-- Login View -->
    <div id="login-view" class="container" style="padding-top: 151px; max-width: 450px;">
        <div class="admin-form-container" style="position: static;">
            <h2 class="text-gradient" style="text-align: center; margin-bottom: 30px; font-size: 1.5rem;">AUTHENTICATION
            </h2>
            <form id="login-form">
                <div class="form-group">
                    <label>ACCESS EMAIL</label>
                    <input type="email" id="email" required placeholder="admin@niley.com">
                </div>
                <div class="form-group">
                    <label>SECURITY KEY</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">ACCESS VAULT</button>
                <p id="login-error"
                    style="color: var(--danger); margin-top: 15px; text-align: center; font-size: 0.9rem;"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="container" style="display: none; padding-top: 120px;">
        <div class="section-title" style="text-align: left;">
            <h2 class="text-gradient">Command Center</h2>
            <p style="color: var(--text-secondary);">Manage the collection of future appliances.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>VAULT ITEMS</h4>
                <p class="stat-value" id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h4>ACTIVE CATEGORIES</h4>
                <p class="stat-value">5</p>
            </div>
            <div class="stat-card">
                <h4>LIVE TRAFFIC</h4>
                <p class="stat-value">HIGH</p>
            </div>
        </div>

        <div class="admin-layout">
            <!-- Editor Form -->
            <div class="admin-form-container">
                <h3 id="form-title" style="margin-bottom: 24px;">ADD ARTIFACT</h3>
                <form id="product-form">
                    <input type="hidden" id="p-id">

                    <div class="form-group">
                        <label>ARTIFACT NAME</label>
                        <input type="text" id="name" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>FORMAL PRICE ($)</label>
                            <input type="number" id="formal-price" step="0.01" required placeholder="e.g. 299">
                        </div>
                        <div class="form-group">
                            <label>DISCOUNT PRICE ($)</label>
                            <input type="number" id="discount-price" step="0.01" placeholder="Optional">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>VISUAL MEDIA</label>
                        <button type="button" id="uploadBtn" class="btn-outline"
                            style="width: 100%; margin-bottom: 10px;">
                            <i class="fas fa-cloud-upload-alt" style="margin-right: 8px;"></i> Upload Media
                        </button>
                        <img id="preview"
                            style="max-width:100%; display:none; border-radius: 8px; border: 1px solid var(--card-border);" />
                    </div>
                    <div class="form-group">
                        <label>SPECIFICATIONS / DESCRIPTION</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn-primary" id="submit-btn" style="flex-grow: 1;">SAVE
                            ARTIFACT</button>
                        <button type="button" onclick="clearForm()" class="btn-outline">RESET</button>
                    </div>
                </form>
            </div>

            <!-- Product List -->
            <div>
                <h3 style="margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px;">Current Vault Inventory
                </h3>
                <div id="admin-product-list">
                    <!-- Items managed by admin.js -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
